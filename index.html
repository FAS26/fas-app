  emailHintsStatic(wk,isGame,e){
    const startDateStr=State.settings.seasonStartDate||'';
    const startDate=startDateStr?new Date(startDateStr):null;
    let sessions=[];
    if(startDate){
      const wkStart=new Date(startDate);wkStart.setDate(wkStart.getDate()+(wk-1)*7);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
      sessions=State.sessions.filter(s=>{const d=new Date(s.date||s.created_at);return d>=wkStart&&d<=wkEnd;});
    } else {
      sessions=State.sessions.slice(0,2);
    }
    const training=sessions.filter(s=>s.session_objective!=='Game Day'&&!s.session_objective?.startsWith('GAMEDAY'));
    const games=sessions.filter(s=>s.session_objective==='Game Day'||s.session_objective?.startsWith('GAMEDAY'));

    // Pull from session AI analysis
    const sessionTopic=training.map(s=>s.session_objective||s.title||'').filter(Boolean).join(', ');
    const focusAreas=training.map(s=>[s.focus_area_1,s.focus_area_2].filter(Boolean).join(' and ')).filter(Boolean).join('; ');
    const sessionHighlights=training.map(s=>s.encouragement||'').filter(Boolean).join(' ');
    const gameReflection=games.map(s=>s.encouragement||'').filter(Boolean).join(' ');
    const gameTitle=games.length?games.map(s=>s.title||'Game').join(', '):'';
    const vals=State.values.length?State.values.join(', '):'';

    let banner='';
    if(sessions.length){
      const names=sessions.map(s=>'<span style="font-size:11px;background:var(--lime-pale);border:1px solid #bbf7d0;border-radius:4px;padding:2px 7px">'+s.title+'</span>').join(' ');
      banner='<div style="background:var(--dark);border-radius:8px;padding:12px 14px;margin-bottom:16px">'
        +'<div style="color:var(--lime);font-weight:600;font-size:12px;margin-bottom:6px">&#10003; '+sessions.length+' upload'+(sessions.length>1?'s':'')+' found for this week</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">'+names+'</div>'
        +'<div style="color:var(--text-muted);font-size:11px;line-height:1.5">The AI will read these uploads and write the email. The prompts below are pre-filled where possible — review and add anything the recordings may not have captured.</div>'
        +'</div>';
    } else {
      banner='<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#78350f">'
        +'<strong>No uploads found for this week.</strong> Upload a session or game day report for best results — or fill in the prompts below and click Generate.'
        +'</div>';
    }

    let fields='';
    if(isGame){
      // PRE-GAME EMAIL
      fields=''
        +'<div class="form-group"><label class="label">What is the team working on in this game? <span style="color:var(--lime-muted);font-size:10px">AI will read from uploads</span></label>'
        +'<textarea id="wf-'+wk+'" class="input" style="min-height:65px" placeholder="e.g. Pressing high as a unit, wide play and overlapping runs, keeping possession under pressure">'+(e.focus||focusAreas)+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Help parents watch intelligently — what tactical or technical themes should they look for?</div></div>'

        +'<div class="form-group"><label class="label">How has training gone this week? <span style="color:var(--lime-muted);font-size:10px">AI will read from uploads</span></label>'
        +'<textarea id="wr-'+wk+'" class="input" style="min-height:60px" placeholder="e.g. The team has been sharp in training. Good energy and real improvement in the press.">'+(e.recap||sessionHighlights)+'</textarea></div>'

        +'<div class="form-group"><label class="label">Match details</label>'
        +'<input type="text" id="wsc-'+wk+'" class="input" placeholder="e.g. Saturday 11am · Riverside Park Field 3 · Home kit" value="'+(e.schedule||'')+'"></div>'

        +'<div class="form-group"><label class="label">Anything else to include? <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<textarea id="wctx-'+wk+'" class="input" style="min-height:45px" placeholder="e.g. Missing two players, weather may be cold, bring extra layers"></textarea></div>';

    } else {
      // MONDAY EMAIL
      fields=''
        // Game reflection
        +'<div class="form-group"><label class="label">How did the game go? <span style="color:var(--lime-muted);font-size:10px">AI will read from game upload</span></label>'
        +'<textarea id="wf-'+wk+'" class="input" style="min-height:70px" placeholder="e.g. Good first half — we created chances and defended well. Second half we lost our shape a little. Work in progress and that is fine.">'+(e.focus||gameReflection)+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Focus on development not the result. Leave blank if no game this week.</div></div>'

        // Training topic - KEY CHANGE: about what the TEAM is working on
        +'<div class="form-group"><label class="label">What is the team working on this week? <span style="color:var(--lime-muted);font-size:10px">AI will read from session upload</span></label>'
        +'<textarea id="wr-'+wk+'" class="input" style="min-height:70px" placeholder="e.g. This week the team is working on combining in the middle third — using quick passes and movement to create space in behind the defence.">'+(e.recap||sessionTopic+(focusAreas?' — '+focusAreas:''))+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Pre-filled from your session upload. This should be about what the <em>team</em> is developing — the AI will explain the why for parents.</div></div>'

        // Values - auto from State.values
        +'<div class="form-group"><label class="label">Values demonstrated this week <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional — AI will reference your team values automatically</span></label>'
        +'<input type="text" id="wval-'+wk+'" class="input" placeholder="'+(vals?'Your values: '+vals:'e.g. Resilience, Communication — add via Team → Values')+'" value="'+(e.values_note||'')+'"></div>'

        // Player spotlight
        +'<div class="form-group"><label class="label">Player spotlight <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<input type="text" id="wsp-'+wk+'" class="input" placeholder="e.g. Bradley showed great commitment with three overlapping runs — specific and genuine" value="'+(e.spotlight||'')+'"></div>'

        // Schedule
        +'<div class="form-group"><label class="label">Upcoming schedule / logistics</label>'
        +'<input type="text" id="wsc-'+wk+'" class="input" placeholder="e.g. Training Mon 6pm + Wed 6pm · Game Saturday 10am at home" value="'+(e.schedule||'')+'"></div>'

        // Extra context
        +'<div class="form-group"><label class="label">Anything else to include? <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<textarea id="wctx-'+wk+'" class="input" style="min-height:45px" placeholder="e.g. Reminder about fee payment, kit collection, early finish this Wednesday"></textarea></div>';
    }

    return banner+fields;
  },

  async generateEmailAI(wk){
    const isGame=(State.weeklyEmails[wk]?.email_type==='pregame');
    const ep=document.getElementById('ep-'+wk);
    const eb=document.getElementById('et-body-'+wk);
    if(ep)ep.style.display='block';
    if(eb){eb.value='Generating your email…';eb.style.opacity='0.5';}

    // Read all prompt fields
    const gameReflection=(document.getElementById('wf-'+wk)?.value||'').trim();
    const teamFocus=(document.getElementById('wr-'+wk)?.value||'').trim();
    const valuesNote=(document.getElementById('wval-'+wk)?.value||'').trim();
    const spotlight=(document.getElementById('wsp-'+wk)?.value||'').trim();
    const schedule=(document.getElementById('wsc-'+wk)?.value||'').trim();
    const extraContext=(document.getElementById('wctx-'+wk)?.value||'').trim();

    // Get sessions for this week
    const startDateStr=State.settings.seasonStartDate||'';
    const startDate=startDateStr?new Date(startDateStr):null;
    let weekSessions=[];
    if(startDate){
      const wkStart=new Date(startDate);wkStart.setDate(wkStart.getDate()+(wk-1)*7);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
      weekSessions=State.sessions.filter(s=>{const d=new Date(s.date||s.created_at);return d>=wkStart&&d<=wkEnd;});
    }
    if(!weekSessions.length)weekSessions=State.sessions.slice(0,2);

    const training=weekSessions.filter(s=>s.session_objective!=='Game Day'&&!s.session_objective?.startsWith('GAMEDAY'));
    const games=weekSessions.filter(s=>s.session_objective==='Game Day'||s.session_objective?.startsWith('GAMEDAY'));

    // Build rich session context from AI analysis fields
    const sessionData=training.map(s=>{
      const parts=[];
      if(s.title)parts.push('Session topic: '+s.title);
      if(s.session_objective)parts.push('Objective: '+s.session_objective);
      if(s.focus_area_1)parts.push('Focus area 1: '+s.focus_area_1);
      if(s.focus_area_2)parts.push('Focus area 2: '+s.focus_area_2);
      if(s.encouragement)parts.push('What went well: '+s.encouragement);
      if(s.grade)parts.push('Session grade: '+s.grade);
      return parts.join('. ');
    }).join('\n\n');

    const gameData=games.map(s=>{
      const parts=[];
      if(s.title)parts.push('Game: '+s.title);
      if(s.encouragement)parts.push('What went well: '+s.encouragement);
      if(s.focus_area_1)parts.push('Focus area 1: '+s.focus_area_1);
      if(s.focus_area_2)parts.push('Focus area 2: '+s.focus_area_2);
      return parts.join('. ');
    }).join('\n\n');

    const teamValues=State.values.length?State.values.join(', '):'';
    const prevBodies=Object.values(State.weeklyEmails).filter(e=>e.body&&e.week<wk).slice(-3).map(e=>e.body);
    const styleSample=prevBodies.join(' | ').slice(0,600);
    const name=coachName();

    // Build AI prompt
    let p='';
    p+='You are writing a parent email for '+name+', a youth football/soccer coach.\n\n';
    p+='EMAIL TYPE: '+(isGame?'Pre-Game email (sent the day before a match)':'Monday email (sent at the start of the training week)')+'\n\n';

    if(sessionData)p+='SESSION ANALYSIS FROM UPLOADS:\n'+sessionData+'\n\n';
    if(gameData)p+='GAME DAY ANALYSIS FROM UPLOADS:\n'+gameData+'\n\n';
    if(gameReflection)p+='COACH NOTES ON THE GAME: '+gameReflection+'\n\n';
    if(teamFocus)p+='WHAT THE TEAM IS WORKING ON: '+teamFocus+'\n\n';
    if(teamValues)p+='TEAM VALUES: '+teamValues+'\n\n';
    if(valuesNote)p+='VALUES DEMONSTRATED THIS WEEK: '+valuesNote+'\n\n';
    if(spotlight)p+='PLAYER SPOTLIGHT: '+spotlight+'\n\n';
    if(schedule)p+='LOGISTICS: '+schedule+'\n\n';
    if(extraContext)p+='EXTRA CONTEXT: '+extraContext+'\n\n';
    if(styleSample)p+='MATCH THIS COACH\u2019S WRITING STYLE (previous emails):\n'+styleSample+'\n\n';

    p+='INSTRUCTIONS:\n';
    p+='1. Write in flowing paragraphs — NO headers, NO bullet points, NO all-caps section titles\n';
    p+='2. Warm and conversational — like a genuine letter from a coach who cares\n';
    p+='3. Development-focused — never about the result, always about growth\n';
    p+='4. The training section must be about what the TEAM is working on and developing — not personal coaching goals\n';
    p+='5. Normalise mistakes — frame them as opportunities to learn\n';
    p+='6. Reference team values naturally if relevant\n';
    if(!isGame){
      p+='7. Include a PARENT REINFORCEMENT section woven naturally into the text — based on what the team is working on, give parents 2-3 specific questions to ask their child (e.g. "Ask them: What did you try today that was hard? What would you do differently?"). These should feel like conversation starters, not homework\n';
      p+='8. The questions should connect directly to the training topic and values demonstrated\n';
    } else {
      p+='7. Help parents watch intelligently — explain what the team is trying to do so parents can appreciate development moments\n';
      p+='8. Remind parents the best thing they can do is encourage without directing — let the players communicate their own ideas\n';
    }
    p+='9. Start with: Hi everyone,\n';
    p+='10. End with: Thank you for all that you do! then a new line with just: '+name+'\n';
    p+='11. Keep it to 3-4 paragraphs maximum — coaches and parents are busy\n';
    p+='12. Write ONLY the email text — no subject line, no commentary\n';

    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_KEY},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:p}]})
      });
      const body=resp.ok?(await resp.json()).content[0].text.trim():Team.fallbackEmail(isGame,training,games,schedule,extraContext,name);
      if(eb){eb.value=body;eb.style.opacity='1';}
      State.weeklyEmails[wk]={...State.weeklyEmails[wk],body,email_type:isGame?'pregame':'monday',schedule,spotlight};
      await sb.from('weekly_emails').upsert({user_id:State.user.id,coach_name:coachName(),week:wk,body,email_type:isGame?'pregame':'monday',schedule,spotlight},{onConflict:'user_id,week'});
    }catch(err){
      const body=Team.fallbackEmail(isGame,training,games,schedule,extraContext,name);
      if(eb){eb.value=body;eb.style.opacity='1';}
    }
  },

  renderImprove(){
    State.currentSubSection='improve';
    const ss=State.sessions.filter(s=>s.session_objective!=='Game Day');
    const areas=[];
    if(ss.length){
      const ag=State.profile?.age_group||'U13';
      const ctx=Framework.getAgeContext(ag);
      const tgt=ctx.targets;
      const avg=key=>ss.reduce((a,s)=>a+parseFloat(s[key]||0),0)/ss.length;
      const qi=avg('qi_ratio'),pc=avg('pc_ratio'),hq=avg('high_order_q'),freeze=avg('freeze_moment'),show=avg('show_me_count');

      if(qi<tgt.qi)areas.push({title:'Questioning Balance (Q:I Ratio)',current:`${fmt(qi)} avg`,target:ctx.qiLabel,priority:'high',why:`For ${ag} coaches, the target is ${ctx.qiLabel}. Players who answer questions learn faster than players who receive instructions. Your Q:I ratio suggests more instructions than questions.`,actions:['Before each activity, prepare 2 open questions to ask during play','Ask "What do you see?" before giving any instruction','After giving an instruction, follow with "Why do you think that is?"']});
      if(parseInt(avg('high_order_q'))<tgt.hq)areas.push({title:'High-Order Questioning',current:`${fmt(avg('high_order_q'),0)} per session`,target:`≥ ${tgt.hq}`,priority:'high',why:'High-order questions (What/Why/How/What if) develop game intelligence. Low-order questions (Did you/Where/Who) only test recall. The shift from "Did you see the space?" to "What do you see?" changes everything.',actions:['Replace every "Did you?" with "What did you?"','Ask "Why?" after every player answer — push one level deeper','Prepare one "What if?" scenario per activity']});
      if(pc<tgt.pc)areas.push({title:'Praise to Correction Ratio',current:`${fmt(pc)} avg`,target:'≥ 3:1',priority:'medium',why:'When players receive more corrections than praise, they become risk-averse — playing not to get it wrong rather than trying to get it right. Build the praise bank first.',actions:['Set a personal target: 3 specific praises before any correction','Praise → Correct → Encourage — use this every time','Name the player and name the action: "Jordan, that run created the space"']});
      if(freeze<tgt.freeze)areas.push({title:'Freeze Moments (Freeze → Demo → Rehearse → Restart)',current:`${fmt(freeze,1)} per session`,target:`≥ ${tgt.freeze}`,priority:'medium',why:'The US Soccer coaching standard requires planned freeze moments. Freeze → ask a question → use the ball to demonstrate (not words) → players rehearse → restart. This is your highest-leverage teaching tool.',actions:['Plan one specific freeze moment per activity before training starts','When you freeze: ask a question first, THEN demonstrate with the ball','Do NOT bring players in and talk at them — use the ball to paint the picture']});
      if(show<2)areas.push({title:'Demonstrations — Use the Ball',current:`${fmt(show,1)} per session`,target:'≥ 2-3',priority:'low',why:'Visual demonstrations accelerate learning. The US Soccer standard is to paint the picture with the ball — not describe it with words. "Show me" is one of your most powerful coaching tools.',actions:['Ask a player to "show me" rather than always demonstrating yourself','Use every freeze moment as a demonstration opportunity','Always demonstrate WHY, not just WHAT']});

    <div class="page-body">
      ${!ss.length?`<div class="empty"><div class="empty-icon">📊</div><h3>Upload your first session</h3><p>Your improvement areas will appear here once you've uploaded and analysed at least one training session.</p><button class="btn btn-primary" style="margin-top:14px" onclick="Nav.go('sessions','new')">Upload Session</button></div>`:''}
      ${areas.map(a=>`<div class="card" style="border-left:4px solid ${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--lime)'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:14px;font-weight:700;color:var(--dark)">${a.title}</div>
          <span class="badge ${a.priority==='high'?'badge-red':a.priority==='medium'?'badge-amber':'badge-lime'}">${a.priority}</span>
        </div>
        <div style="display:flex;gap:16px;margin-bottom:10px;font-size:13px">
          <div><span style="color:var(--text-muted)">Current: </span><strong>${a.current}</strong></div>
          <div><span style="color:var(--text-muted)">Target: </span><strong style="color:var(--dark)">${a.target}</strong></div>
        </div>
        <p style="font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:10px">${a.why}</p>
        <div style="background:var(--lime-pale);border-radius:var(--radius-xs);padding:10px 12px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--dark);margin-bottom:7px">What to try this week</div>
          ${a.actions.map(ac=>`<div style="display:flex;gap:7px;margin-bottom:5px;font-size:13px"><span style="color:var(--lime);font-weight:700;flex-shrink:0">→</span><span>${ac}</span></div>`).join('')}
        </div>
      </div>`).join('')}
      ${areas.length===0&&ss.length>0?`<div class="alert alert-success">All metrics are above target. Keep maintaining your standards and look for ways to deepen the quality of your questioning and player connections.</div>`:''}
    </div>`);

      const mk=(id,type,data,opts)=>{const el=$(id);if(!el)return;const c=new Chart(el,{type,data,options:opts||lo});State.activeCharts.push(c);};

      mk('pH','bar',{labels,datasets:[{data:sorted.map(s=>parseInt(s.high_order_q)||0),backgroundColor:'#84cc16',borderRadius:3,borderSkipped:false}]});
      mk('pP','line',{labels,datasets:[{data:sorted.map(s=>parseFloat(s.pc_ratio)||0),borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,0.1)',tension:0.3,fill:true,pointRadius:4}]},{...lo,scales:{...lo.scales,y:{...lo.scales.y,suggestedMax:6}}});

          <div class="card">
            <div class="card-title">Contact History — ${notes?.length||0} entries</div>
            ${!notes?.length?`<div class="empty" style="padding:20px"><p>No contact logged yet. Use the form above to record observations, meetings and conversations.</p></div>`:''}
            ${(notes||[]).map(n=>`<div style="border:1px solid var(--border);border-radius:var(--radius-xs);padding:14px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <span class="badge ${n.type==='observation'?'badge-lime':n.type==='meeting'?'badge-blue':n.type==='email'?'badge-amber':'badge-green'}">${n.type||'note'}</span>
                <span style="font-size:12px;color:var(--text-muted)">${n.created_at?.slice(0,10)||''}</span>
              </div>
              <p style="font-size:13px;line-height:1.7;color:var(--text)">${n.notes||''}</p>
              ${n.file_name?`<div style="margin-top:8px;font-size:12px;color:var(--lime)">📎 ${n.file_name}</div>`:''}
            </div>`).join('')}

        </div>
      </div>
    </div>`;

    Director.setLayout('coaches', mainHtml);

    setTimeout(()=>{
      if(sorted.length>1){
        const el=$('dcQ');if(!el)return;
        const c=new Chart(el,{type:'line',data:{labels:sorted.map(s=>s.date?.slice(5)||''),datasets:[{data:sorted.map(s=>parseFloat(s.qi_ratio)||0),borderColor:'#84cc16',backgroundColor:'rgba(132,204,22,.1)',tension:.3,fill:true,pointRadius:5,pointBackgroundColor:'#84cc16'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},beginAtZero:true,suggestedMax:1.5}}}});
        State.activeCharts.push(c);
      }
    },150);
  },

  coachTab(tab, coachId){
    [1,2,3].forEach(t=>{
      const btn=$(`dct-${t}`);const body=$(`dct-body-${t}`);
      if(btn)btn.classList.toggle('active',t===tab);
      if(body)body.style.display=t===tab?'block':'none';
    });
  },

  async saveNote(coachId, coachName){
    const type=$('nt-type')?.value||'note';
    const notes=$('nt-notes')?.value?.trim()||'';
    const file=$('nt-file')?.files?.[0];
    if(!notes){alert('Please add some notes.');return;}
    const row={director_id:State.profile.id,coach_id:coachId,coach_name:coachName,type,notes,file_name:file?.name||null,created_at:new Date().toISOString()};
    const{error}=await sb.from('director_notes').insert(row);
    if(error){alert('Error saving: '+error.message);return;}
    Director.viewCoach(coachId);

        <div class="card-title">Club Resources — ${(resources||[]).length} uploaded</div>

          ${(resources||[]).filter(r=>r.category===cat).map(r=>`
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:20px">${r.file_name?.endsWith('.pdf')?'📄':r.file_name?.match(/\.(mp3|m4a|wav)$/)?'🎙️':'📝'}</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${r.title||r.file_name}</div>
              ${r.description?`<div style="font-size:12px;color:var(--text-muted)">${r.description}</div>`:''}

  handleResourceFile(input){

    if(!$('res-title').value)$('res-title').value=file.name.replace(/\.[^.]+$/,'');
  },

  async saveResource(){
    const cat=$('res-cat')?.value||'Other';
    const title=$('res-title')?.value?.trim()||'';
    const desc=$('res-desc')?.value?.trim()||'';
    const file=$('resFile')?.files?.[0];
    if(!title){alert('Please add a title.');return;}
    const row={director_id:State.profile.id,category:cat,title,description:desc,file_name:file?.name||null,created_at:new Date().toISOString()};

  },

  // ── MY TASKS TAB ───────────────────────────────────────────────────────────
  async renderTasks(){
    State.currentSubSection='tasks';
    const profile=State.profile;
    const{data:tasks}=await sb.from('director_tasks').select('*').eq('director_id',profile.id).order('created_at',{ascending:false});
    const{data:notes}=await sb.from('director_notes').select('coach_id,type,created_at').eq('director_id',profile.id);
    const{data:coaches}=await sb.from('profiles').select('id,first_name,last_name').eq('club_id',(await sb.from('clubs').select('id').eq('director_id',profile.id).maybeSingle()).data?.id||'');

    const taskTypes=['Email to Coach','Coach Meeting','Coach Observation','Check-in','Other'];
    const pending=(tasks||[]).filter(t=>!t.done);
    const done=(tasks||[]).filter(t=>t.done);

    // Build observation heatmap
    const observationMap={};
    (coaches||[]).forEach(c=>{
      const coachNotes=(notes||[]).filter(n=>n.coach_id===c.id);
      const lastObs=coachNotes.filter(n=>n.type==='observation').sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
      const lastContact=coachNotes.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
      observationMap[c.id]={
        lastObs:lastObs?.created_at||null,
        lastContact:lastContact?.created_at||null,
        obsCount:coachNotes.filter(n=>n.type==='observation').length,
        totalContact:coachNotes.length
      };
    });

    const mainHtml=`
    <div class="page-header"><div><h1>My Tasks</h1><p>${pending.length} pending · ${done.length} completed</p></div></div>
    <div class="page-body">

      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Observation Heatmap — Who Needs Attention</div>
        ${!(coaches||[]).length?`<p style="font-size:13px;color:var(--text-muted)">No coaches in your club yet.</p>`:''}
        ${(coaches||[]).map(c=>{
          const m=observationMap[c.id]||{};
          const daysSinceObs=m.lastObs?Math.floor((new Date()-new Date(m.lastObs))/(1000*60*60*24)):999;
          const daysSinceContact=m.lastContact?Math.floor((new Date()-new Date(m.lastContact))/(1000*60*60*24)):999;
          return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--dark);color:var(--lime);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">${c.first_name?.charAt(0)||'?'}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${c.first_name} ${c.last_name}</div>
              <div style="font-size:11px;color:var(--text-muted)">Last observation: ${daysSinceObs===999?'Never':daysSinceObs+'d ago'} · Last contact: ${daysSinceContact===999?'Never':daysSinceContact+'d ago'}</div>
            </div>
            <div style="display:flex;gap:4px;align-items:center">
              ${Array.from({length:Math.min(m.totalContact||0,8)},(_,i)=>`<div style="width:8px;height:24px;background:${i<(m.obsCount||0)?'var(--lime)':'#3b82f6'};border-radius:2px;opacity:.8"></div>`).join('')}
              ${(m.totalContact||0)===0?`<span style="font-size:11px;color:var(--red);font-weight:600">No contact</span>`:''}
            </div>
            <span class="badge ${daysSinceContact<=7?'badge-green':daysSinceContact<=14?'badge-amber':'badge-red'}">${daysSinceContact===999?'Never':daysSinceContact<=0?'Today':daysSinceContact+'d'}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Add Task</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group"><label class="label">Type</label>
            <select id="task-type" class="input">${taskTypes.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="label">Coach (optional)</label>
            <select id="task-coach" class="input"><option value="">All / General</option>${(coaches||[]).map(c=>`<option value="${c.first_name+' '+c.last_name}">${c.first_name} ${c.last_name}</option>`).join('')}</select>
          </div>
        </div>
        <div class="form-group"><label class="label">Task Description</label>
          <input type="text" id="task-desc" class="input" placeholder="e.g. Observe training session — focus on questioning technique" onkeydown="if(event.key==='Enter')Director.addTask()">
        </div>
        <div class="form-group"><label class="label">Due Date (optional)</label>
          <input type="date" id="task-due" class="input">
        </div>
        <button class="btn btn-primary" onclick="Director.addTask()">Add Task</button>
      </div>

      ${pending.length?`<div class="card" style="margin-bottom:14px">
        <div class="card-title">Pending — ${pending.length}</div>
        ${pending.map(t=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)">
          <div onclick="Director.toggleTask('${t.id}',true)" style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border-strong);cursor:pointer;flex-shrink:0;margin-top:2px"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${t.description||''}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">
              <span class="badge badge-blue" style="margin-right:6px">${t.task_type||'task'}</span>
              ${t.coach_name?`<span style="margin-right:6px">→ ${t.coach_name}</span>`:''}
              ${t.due_date?`<span>Due: ${t.due_date}</span>`:''}
            </div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="Director.deleteTask('${t.id}')">✕</button>
        </div>`).join('')}
      </div>`:''}

      ${done.length?`<div class="card">
        <div class="card-title">Completed — ${done.length}</div>
        ${done.slice(0,10).map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);opacity:.6">
          <div onclick="Director.toggleTask('${t.id}',false)" style="width:20px;height:20px;border-radius:50%;background:var(--lime);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#14532d" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
          </div>
          <div style="flex:1;font-size:13px;text-decoration:line-through;color:var(--text-muted)">${t.description||''}</div>
        </div>`).join('')}
      </div>`:''}
    </div>`;
    Director.setLayout('tasks', mainHtml);
  },

  async addTask(){
    const type=$('task-type')?.value||'Other';
    const desc=$('task-desc')?.value?.trim()||'';
    const coach=$('task-coach')?.value||'';
    const due=$('task-due')?.value||null;
    if(!desc){alert('Please describe the task.');return;}
    await sb.from('director_tasks').insert({director_id:State.profile.id,task_type:type,description:desc,coach_name:coach||null,due_date:due,done:false});
    Director.renderTasks();
  },

  async toggleTask(id,done){
    await sb.from('director_tasks').update({done}).eq('id',id);
    Director.renderTasks();
  },

  async deleteTask(id){
    await sb.from('director_tasks').delete().eq('id',id);
    Director.renderTasks();
  },

  async renderSetup(){
    const profile=State.profile;
    const{data:existingClub}=await sb.from('clubs').select('*').eq('director_id',profile.id).maybeSingle();
    const generateCode=()=>{const w=['UNITED','ELITE','ACADEMY','FORCE','ATHLETIC','YOUTH'];return w[Math.floor(Math.random()*w.length)]+(Math.floor(100+Math.random()*900));};

    const mainHtml=`
    <div class="page-header"><div><h1>${existingClub?'Club Settings':'Create Your Club'}</h1></div></div>
    <div class="page-body">
      <div class="card">
        <div class="card-title">Club Details</div>
        <div class="form-group"><label class="label">Club Name</label><input type="text" id="club-name" class="input" placeholder="e.g. NCYSA North" value="${existingClub?.name||''}"></div>
        <div class="form-group"><label class="label">Club Code — share with coaches on signup</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="club-code" class="input" value="${existingClub?.code||generateCode()}" style="text-transform:uppercase;font-weight:700;letter-spacing:2px;font-size:16px">
            ${!existingClub?`<button class="btn btn-sm btn-dark" onclick="$('club-code').value='${generateCode()}'">New Code</button>`:''}
          </div>
        </div>
        <button class="btn btn-primary" onclick="Director.saveClub('${existingClub?.id||''}')">${existingClub?'Save Changes':'Create Club'}</button>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="card-title">Your Role</div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">If you also coach a team, set your role to Both to access both dashboards.</p>
        <div style="display:flex;gap:8px">
          <button class="btn ${profile.role==='director'?'btn-primary':''}" onclick="Director.setRole('director')">Director Only</button>
          <button class="btn ${profile.role==='both'?'btn-primary':''}" onclick="Director.setRole('both')">Both — Coach & Director</button>
        </div>
      </div>
    </div>`;
    Director.setLayout('coaches', mainHtml);
  },

  async saveClub(existingId){
    const name=$('club-name')?.value?.trim();
    const code=($('club-code')?.value?.trim()||'').toUpperCase();
    if(!name||!code){alert('Please enter a club name and code.');return;}
    if(existingId){
      await sb.from('clubs').update({name,code}).eq('id',existingId);
    } else {
      const{data,error}=await sb.from('clubs').insert({director_id:State.profile.id,name,code}).select().single();
      if(error){alert('Error: '+error.message);return;}
      await sb.from('profiles').update({club_id:data.id}).eq('id',State.profile.id);
    }
    Director.renderCoaches();
  },

  async setRole(role){
    await sb.from('profiles').update({role}).eq('id',State.profile.id);
    State.profile.role=role;
    const rs=$('roleSwitcher');
    if(role==='both'){if(rs)rs.style.display='flex';}
    else{if(rs)rs.style.display='none';}
    Director.renderSetup();
  }
};
