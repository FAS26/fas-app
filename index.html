const Team={
  render(sub){
    Nav.renderSubNav('team');
    if(!sub||sub==='roadmap')Team.renderRoadmap();
    else if(sub==='emails')Team.renderEmails();
    else if(sub==='players')Team.renderPlayers();
    else if(sub==='roster')Team.renderRoster();
  },

  // ── ROADMAP ──────────────────────────────────────────────────────────────────
  renderRoadmap(){
    State.currentSubSection='roadmap';
    const PHASES=Team.getPhases();
    const checked=State.roadmap;
    const total=PHASES.reduce((a,p)=>a+p.items.length,0);
    const done=PHASES.reduce((a,p)=>a+p.items.filter(it=>checked[`${p.id}-${it.id}`]?.checked).length,0);
    const pv=Math.round((done/total)*100);

    // Season start date logic
    const startDateStr=State.settings.seasonStartDate||'';
    const startDate=startDateStr?new Date(startDateStr):null;
    const today=new Date();
    const weekNum=startDate?Math.max(1,Math.ceil((today-startDate)/(1000*60*60*24*7))):null;

    // Determine current phase based on week
    // pre=before week 1, early=weeks 1-4, mid=weeks 5-9, late=weeks 10-12, end=week 13+
    const getPhaseStatus=(phaseId)=>{
      if(!weekNum) return 'active'; // No date set — show all
      if(phaseId==='pre') return weekNum<=0?'active':'past';
      if(phaseId==='early') return weekNum>=1&&weekNum<=4?'active':weekNum<1?'future':'past';
      if(phaseId==='mid') return weekNum>=5&&weekNum<=9?'active':weekNum<5?'future':'past';
      if(phaseId==='late') return weekNum>=10&&weekNum<=12?'active':weekNum<10?'future':'past';
      if(phaseId==='end') return weekNum>=13?'active':weekNum<13?'future':'past';
      return 'active';
    };

    // This week's priority task — first unchecked essential item in current phase
    let thisWeekTask=null;
    if(weekNum){
      for(const phase of PHASES){
        if(getPhaseStatus(phase.id)==='active'){
          const unchecked=phase.items.filter(it=>!checked[`${phase.id}-${it.id}`]?.checked&&it.pri==='essential');
          if(unchecked.length){thisWeekTask={phase,item:unchecked[0]};break;}
        }
      }
    }

    setMain(`
    <div class="page-header">
      <div><h1>Season Roadmap</h1><p>${done}/${total} complete · ${pv}%</p></div>
      <button class="btn btn-sm btn-dark" onclick="Team.setSeasonDate()">📅 ${startDateStr?'Season started: '+startDateStr:'Set Season Start Date'}</button>
    </div>
    <div class="page-body">
      <div class="prog-bar" style="margin-bottom:18px;height:9px"><div class="prog-fill" style="width:${pv}%"></div></div>

      ${!startDateStr?`<div class="alert alert-info" style="margin-bottom:16px">
        <strong>Set your season start date</strong> to unlock a week-by-week view. The roadmap will show you exactly what to focus on each week — and keep future tasks out of the way until you need them.
        <button class="btn btn-primary btn-sm" style="margin-top:10px;display:block" onclick="Team.setSeasonDate()">Set Start Date →</button>
      </div>`:`<div class="alert alert-success" style="margin-bottom:16px">
        Season Week ${weekNum} of 13 · ${startDateStr?'Started: '+startDateStr:''}
      </div>`}

      ${thisWeekTask?`<div style="background:var(--dark);border:2px solid var(--lime);border-radius:var(--radius);padding:18px;margin-bottom:20px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--lime);margin-bottom:10px">🎯 THIS WEEK — Priority Task</div>
        <div style="font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px">${thisWeekTask.item.title}</div>
        <div style="font-size:12px;color:var(--lime-muted);line-height:1.6;margin-bottom:12px">${thisWeekTask.item.desc}</div>
        ${thisWeekTask.item.prompt?`<details><summary style="cursor:pointer;font-size:12px;color:var(--lime);font-weight:600;list-style:none">▸ Open facilitation guide</summary><div style="margin-top:10px;background:#0a2a0a;border-radius:var(--radius-xs);padding:12px 14px;font-size:12px;line-height:1.7;white-space:pre-line;color:#dcfce7">${thisWeekTask.item.prompt}</div></details>`:''}
        <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="Team.toggleRoadmap('${thisWeekTask.phase.id}-${thisWeekTask.item.id}')">Mark Complete ✓</button>
      </div>`:''}

      ${PHASES.map(phase=>{
        const pd=phase.items.filter(it=>checked[`${phase.id}-${it.id}`]?.checked).length;
        const allDone=pd===phase.items.length;
        const status=getPhaseStatus(phase.id);
        const isActive=status==='active';
        const isFuture=status==='future'&&startDateStr;
        const isPast=status==='past'&&startDateStr;

        if(isFuture){
          const weeksUntil=phase.id==='early'?Math.max(0,1-weekNum):phase.id==='mid'?Math.max(0,5-weekNum):phase.id==='late'?Math.max(0,10-weekNum):Math.max(0,13-weekNum);
          return`<div style="margin-bottom:12px;opacity:.75">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--dark);border-radius:var(--radius-xs);cursor:pointer" onclick="Team.togglePhase('future-${phase.id}')">
              <div style="font-size:18px">${phase.icon}</div>
              <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--white)">${phase.label}</div><div style="font-size:11px;color:var(--lime-muted)">${phase.timing} · ${phase.items.length} tasks</div></div>
              <span style="font-size:11px;color:var(--lime-muted)">In ${weeksUntil}w · preview ▸</span>
            </div>
            <div id="future-${phase.id}" style="display:none">
              ${phase.items.map(item=>`<div class="roadmap-item" style="opacity:.7">
                <div class="check-circle" style="cursor:default;opacity:.3"></div>
                <div style="flex:1">
                  <div style="margin-bottom:2px">
                    <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;background:${item.catBg||'#f1f5f9'};color:${item.catTxt||'#334155'}">${item.cat}</span>
                    ${item.pri==='essential'?`<span style="font-size:10px;color:var(--red);font-weight:600;margin-left:5px">Essential</span>`:''}
                  </div>
                  <div style="font-size:13px;font-weight:600;color:var(--text-muted)">${item.title}</div>
                  <div style="font-size:12px;color:var(--text-faint);line-height:1.5">${item.desc}</div>
                  ${item.prompt?`<details style="margin-top:7px"><summary style="cursor:pointer;font-size:12px;color:var(--text-muted);font-weight:600;list-style:none">▸ Preview facilitation guide</summary><div style="margin-top:7px;background:var(--lime-pale);border:1px solid var(--border);border-radius:var(--radius-xs);padding:11px 13px;font-size:12px;line-height:1.65;white-space:pre-line">${item.prompt}</div></details>`:''}
                </div>
              </div>`).join('')}
            </div>
          </div>`;
        }

        if(isPast){
          // Past phases — use same full rendering as active phase
          // so facilitation guides are always accessible
          return`<div style="margin-bottom:22px;opacity:.9">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--dark);border-radius:var(--radius-xs);margin-bottom:10px;cursor:pointer" onclick="Team.togglePhase('past-${phase.id}')">
              <div style="font-size:18px">${phase.icon}</div>
              <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--white)">${phase.label}</div><div style="font-size:11px;color:var(--lime-muted)">${phase.timing} · ${pd}/${phase.items.length} complete</div></div>
              <span style="font-size:11px;font-weight:600;color:${allDone?'var(--lime)':'#fbbf24'}">${allDone?'✓ Complete':'In progress'} ▾</span>
            </div>
            <div id="past-${phase.id}" style="display:block">
              ${Team.renderPhaseItems(phase,checked)}
            </div>
          </div>`;
        }

        // Active phase — full detail
        return`<div style="margin-bottom:22px">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--dark);border:1px solid var(--lime);border-radius:var(--radius-xs);margin-bottom:10px">
            <div style="font-size:18px">${phase.icon}</div>
            <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--lime)">${phase.label} ${isActive&&startDateStr?'— Current Phase':''}</div><div style="font-size:11px;color:var(--lime-muted)">${phase.timing} · ${pd}/${phase.items.length}</div></div>
            <span style="font-size:11px;font-weight:600;color:${allDone?'var(--lime)':pd>0?'#fbbf24':'#6b7280'}">${allDone?'✓ Complete':pd>0?'In progress':'Not started'}</span>
          </div>
          ${phase.items.map(item=>{
            const key=`${phase.id}-${item.id}`,isChecked=!!checked[key]?.checked;
            const isThisWeek=thisWeekTask?.item.id===item.id&&thisWeekTask?.phase.id===phase.id;
            return`<div class="roadmap-item ${isChecked?'checked':''}" style="${isThisWeek?'border:1px solid var(--lime);background:#f0fdf4;':''}">
              <div class="check-circle ${isChecked?'checked':''}" onclick="Team.toggleRoadmap('${key}')">
                ${isChecked?'<svg width="9" height="9" viewBox="0 0 9 9"><polyline points="1.5,4.5 3.5,6.5 7.5,2" stroke="#14532d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
              </div>
              <div style="flex:1">
                <div style="margin-bottom:3px">
                  <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;background:${item.catBg||'#f1f5f9'};color:${item.catTxt||'#334155'}">${item.cat}</span>
                  ${item.pri==='essential'?`<span style="font-size:10px;color:var(--red);font-weight:600;margin-left:5px">Essential</span>`:''}
                </div>
                <div style="font-size:13px;font-weight:600;margin-bottom:3px;${isChecked?'text-decoration:line-through;color:var(--text-muted)':''}">${item.title}</div>
                <div style="font-size:12px;color:var(--text-muted);line-height:1.5">${item.desc}</div>
                ${!isChecked&&item.prompt?`<details style="margin-top:7px"><summary style="cursor:pointer;font-size:12px;color:var(--dark);font-weight:600;list-style:none;display:flex;align-items:center;gap:4px"><span>▸</span> Facilitation guide & prompts</summary><div style="margin-top:7px;background:var(--lime-pale);border:1px solid var(--border);border-radius:var(--radius-xs);padding:11px 13px;font-size:12px;line-height:1.65;white-space:pre-line;color:var(--text)">${item.prompt}</div></details>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`);
  },

          desc:'Run a structured parent meeting using small group facilitation. Parents co-create expectations — for their child, for you, and for themselves.',
          prompt:`BEFORE THE MEETING — complete your prep in the app:
• My Coaching History (brief — relevant only)
• Why I Coach

ITEMS NEEDED: Whiteboard and dry-erase markers · Blindfolds or bibs (optional)

RUN OF SHOW

(3-5 min) INTRODUCTION
Introduce yourself — keep it relevant and brief. Cover your coaching history, why you coach, what parents can expect on the field, your philosophy on teaching and learning, your communication style, how you plan to rotate players through positions and why, and what you are looking for from each player.

(7 min) ROUND 1 — PLAYER EXPECTATIONS
Break into groups of 3-4 (30 sec). Introductions — choose a spokesperson (1 min). Groups discuss: What are your expectations for your child's experience? (3 min). Coach writes answers on the board while groups discuss.

(7 min) ROUND 2 — EXPECTATIONS FOR THE COACH
New groups of 3-4 (30 sec). Introductions (1 min). Groups discuss: What are your expectations of me as your coach? (3 min). Coach writes on board.

(7 min) ROUND 3 — PARENT EXPECTATIONS (Sideline Behaviour)
New groups (30 sec). Introductions (1 min). Groups discuss: What do you expect of yourselves as parents on the sideline? (3 min). Coach writes on board.

CLOSING: Thank parents, share schedule and logistics, invite questions.`},

        {id:'team-meet',title:'Team Meeting — What Makes a Great Teammate?',cat:'Culture',catBg:C.cult.bg,catTxt:C.cult.txt,pri:'essential',
          desc:'Players co-create team values in small groups, define standards, and prepare to share with parents at the Parent Meeting.',
          prompt:`PURPOSE: Players create the values — not the coach. When players own the values, they live by them.

STEP 1 — SMALL GROUP DISCUSSION (8 min)
Break the team into groups of 3-4. Each group discusses: What makes a great teammate? Give 5 minutes — do not give examples, let them find their own words. Each group picks 2-3 words or phrases that mean the most to them.

STEP 2 — GROUP HARVEST (5 min)
Each group shares their words — write every single one on the whiteboard. Do not edit or judge. Once all words are up, read them back.

STEP 3 — FIND THE THEMES (5 min)
Ask: Do any of these words say the same thing in different ways? Let players group them — do not do it for them. Aim for 3-5 themes.

STEP 4 — NAME THE VALUES (3 min)
Each theme needs a name — ask players to choose one word that captures it. Write the final 3-5 values clearly. Save these in the app as your Team Values.

STEP 5 — DEFINE THE STANDARDS (8 min)
For EACH value, ask two questions:
• How will we bring this value to life?
• If someone was watching us on SILENT FILM — no sound — how would they know we are living this value?
Record the answers — these become your Team Standards.

STEP 6 — COMMITMENT (2 min)
Read the values and standards back. Ask: Does everyone agree to hold each other to these? Close with a team huddle — let a player lead it.

COACH'S CLOSING LINE: "These are our values. You wrote them, not me. All season I will be asking if we are living up to them — and so should you."

→ The values you capture here will automatically appear in your Parent Meeting template.`},

  async toggleRoadmap(key){

    await sb.from('roadmap').upsert({user_id:State.user.id,coach_name:coachName(),key,checked:nv},{onConflict:'user_id,key'});

  togglePhase(id){
    const el=document.getElementById(id);
    if(el)el.style.display=el.style.display==='none'?'block':'none';
  },

  renderPhaseItems(phase,checked){
    return phase.items.map(item=>{
      const key=phase.id+'-'+item.id;
      const isChecked=!!(checked[key]&&checked[key].checked);
      const checkSvg=isChecked?'<svg width="9" height="9" viewBox="0 0 9 9"><polyline points="1.5,4.5 3.5,6.5 7.5,2" stroke="#14532d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';
      const strikeStyle=isChecked?'text-decoration:line-through;color:var(--text-muted)':'';
      const catSpan='<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;background:'+(item.catBg||'#f1f5f9')+';color:'+(item.catTxt||'#334155')+'">'+item.cat+'</span>';
      const essSpan=item.pri==='essential'?'<span style="font-size:10px;color:var(--red);font-weight:600;margin-left:5px">Essential</span>':'';
      let guideHtml='';
      if(item.prompt){
        guideHtml='<details style="margin-top:7px"><summary style="cursor:pointer;font-size:12px;color:var(--dark);font-weight:600;list-style:none;display:flex;align-items:center;gap:4px"><span>▸</span> Facilitation guide & prompts</summary>'
          +'<div style="margin-top:7px;background:var(--lime-pale);border:1px solid #bbf7d0;border-radius:6px;padding:11px 13px;font-size:12px;line-height:1.65;white-space:pre-line;color:#0a0a0a">'+item.prompt+'</div></details>';
      }
      return '<div class="roadmap-item '+(isChecked?'checked':'')+'">'
        +'<div class="check-circle '+(isChecked?'checked':'')+'" onclick="Team.toggleRoadmap(\''+key+'\')">'+checkSvg+'</div>'
        +'<div style="flex:1">'
          +'<div style="margin-bottom:3px">'+catSpan+essSpan+'</div>'
          +'<div style="font-size:13px;font-weight:600;margin-bottom:3px;'+strikeStyle+'">'+item.title+'</div>'
          +'<div style="font-size:12px;color:var(--text-muted);line-height:1.5">'+item.desc+'</div>'
          +guideHtml
        +'</div>'
        +'</div>';
    }).join('');
  },

    const weekRows=[];
    for(let i=0;i<12;i++){
      const wk=i+1;
      const e=State.weeklyEmails[wk]||{};

      }
      const sentBadge=e.sent?'<span style="color:#15803d;font-weight:600">✓ Sent</span>':'Not sent';
      const monday_active=!isGame?'active':'';
      const pregame_active=isGame?'active':'';
      const bodyDisplay=e.body?'block':'none';
      const bodyVal=e.body||'';
      const sentBtn=e.sent?'✓ Sent':'Mark as Sent';

      weekRows.push('<div class="week-card">'
        +'<div class="week-card-hdr" onclick="Team.toggleWeek('+wk+')">'
          +'<div class="week-num">'+wk+'</div>'
          +'<div style="flex:1">'
            +'<div style="font-size:13px;font-weight:600">Week '+wk+' — '+phase+(weekDateRange?' · '+weekDateRange:'')+'</div>'
            +'<div style="font-size:11px;color:var(--text-muted)">'+sentBadge+'</div>'
          +'</div>'
          +'<span id="wa-'+wk+'" style="font-size:15px;color:var(--text-faint)">›</span>'
        +'</div>'
        +'<div class="week-body" id="wb-'+wk+'">'
          +'<div class="tabs" style="margin-bottom:12px">'
            +'<button class="tab-btn '+monday_active+'" onclick="Team.setEmailType('+wk+',\'monday\')">📅 Monday Email</button>'
            +'<button class="tab-btn '+pregame_active+'" onclick="Team.setEmailType('+wk+',\'pregame\')">🏟️ Pre-Game Email</button>'
          +'</div>'
          +'<div id="et-form-'+wk+'">'

  emailHintsStatic(wk,isGame,e){
    const startDateStr=State.settings.seasonStartDate||'';
    const startDate=startDateStr?new Date(startDateStr):null;
    let sessions=[];
    if(startDate){
      const wkStart=new Date(startDate);wkStart.setDate(wkStart.getDate()+(wk-1)*7);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
      sessions=State.sessions.filter(s=>{const d=new Date(s.date||s.created_at);return d>=wkStart&&d<=wkEnd;});
    } else {
      sessions=State.sessions.slice(0,2);
    }
    const training=sessions.filter(s=>s.session_objective!=='Game Day'&&!s.session_objective?.startsWith('GAMEDAY'));
    const games=sessions.filter(s=>s.session_objective==='Game Day'||s.session_objective?.startsWith('GAMEDAY'));

    // Pull from session AI analysis
    const sessionTopic=training.map(s=>s.session_objective||s.title||'').filter(Boolean).join(', ');
    const focusAreas=training.map(s=>[s.focus_area_1,s.focus_area_2].filter(Boolean).join(' and ')).filter(Boolean).join('; ');
    const sessionHighlights=training.map(s=>s.encouragement||'').filter(Boolean).join(' ');
    const gameReflection=games.map(s=>s.encouragement||'').filter(Boolean).join(' ');
    const gameTitle=games.length?games.map(s=>s.title||'Game').join(', '):'';
    const vals=State.values.length?State.values.join(', '):'';

    let banner='';
    if(sessions.length){
      const names=sessions.map(s=>'<span style="font-size:11px;background:var(--lime-pale);border:1px solid #bbf7d0;border-radius:4px;padding:2px 7px">'+s.title+'</span>').join(' ');
      banner='<div style="background:var(--dark);border-radius:8px;padding:12px 14px;margin-bottom:16px">'
        +'<div style="color:var(--lime);font-weight:600;font-size:12px;margin-bottom:6px">&#10003; '+sessions.length+' upload'+(sessions.length>1?'s':'')+' found for this week</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">'+names+'</div>'
        +'<div style="color:var(--text-muted);font-size:11px;line-height:1.5">The AI will read these uploads and write the email. The prompts below are pre-filled where possible — review and add anything the recordings may not have captured.</div>'
        +'</div>';
    } else {
      banner='<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#78350f">'
        +'<strong>No uploads found for this week.</strong> Upload a session or game day report for best results — or fill in the prompts below and click Generate.'
        +'</div>';
    }

    let fields='';
    if(isGame){
      // PRE-GAME EMAIL
      fields=''
        +'<div class="form-group"><label class="label">What is the team working on in this game? <span style="color:var(--lime-muted);font-size:10px">AI will read from uploads</span></label>'
        +'<textarea id="wf-'+wk+'" class="input" style="min-height:65px" placeholder="e.g. Pressing high as a unit, wide play and overlapping runs, keeping possession under pressure">'+(e.focus||focusAreas)+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Help parents watch intelligently — what tactical or technical themes should they look for?</div></div>'

        +'<div class="form-group"><label class="label">How has training gone this week? <span style="color:var(--lime-muted);font-size:10px">AI will read from uploads</span></label>'
        +'<textarea id="wr-'+wk+'" class="input" style="min-height:60px" placeholder="e.g. The team has been sharp in training. Good energy and real improvement in the press.">'+(e.recap||sessionHighlights)+'</textarea></div>'

        +'<div class="form-group"><label class="label">Match details</label>'
        +'<input type="text" id="wsc-'+wk+'" class="input" placeholder="e.g. Saturday 11am · Riverside Park Field 3 · Home kit" value="'+(e.schedule||'')+'"></div>'

        +'<div class="form-group"><label class="label">Anything else to include? <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<textarea id="wctx-'+wk+'" class="input" style="min-height:45px" placeholder="e.g. Missing two players, weather may be cold, bring extra layers"></textarea></div>';

    } else {
      // MONDAY EMAIL
      fields=''
        // Game reflection
        +'<div class="form-group"><label class="label">How did the game go? <span style="color:var(--lime-muted);font-size:10px">AI will read from game upload</span></label>'
        +'<textarea id="wf-'+wk+'" class="input" style="min-height:70px" placeholder="e.g. Good first half — we created chances and defended well. Second half we lost our shape a little. Work in progress and that is fine.">'+(e.focus||gameReflection)+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Focus on development not the result. Leave blank if no game this week.</div></div>'

        // Training topic - KEY CHANGE: about what the TEAM is working on
        +'<div class="form-group"><label class="label">What is the team working on this week? <span style="color:var(--lime-muted);font-size:10px">AI will read from session upload</span></label>'
        +'<textarea id="wr-'+wk+'" class="input" style="min-height:70px" placeholder="e.g. This week the team is working on combining in the middle third — using quick passes and movement to create space in behind the defence.">'+(e.recap||sessionTopic+(focusAreas?' — '+focusAreas:''))+'</textarea>'
        +'<div style="font-size:11px;color:var(--text-muted);margin-top:3px">Pre-filled from your session upload. This should be about what the <em>team</em> is developing — the AI will explain the why for parents.</div></div>'

        // Values - auto from State.values
        +'<div class="form-group"><label class="label">Values demonstrated this week <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional — AI will reference your team values automatically</span></label>'
        +'<input type="text" id="wval-'+wk+'" class="input" placeholder="'+(vals?'Your values: '+vals:'e.g. Resilience, Communication — add via Team → Values')+'" value="'+(e.values_note||'')+'"></div>'

        // Player spotlight
        +'<div class="form-group"><label class="label">Player spotlight <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<input type="text" id="wsp-'+wk+'" class="input" placeholder="e.g. Bradley showed great commitment with three overlapping runs — specific and genuine" value="'+(e.spotlight||'')+'"></div>'

        // Schedule
        +'<div class="form-group"><label class="label">Upcoming schedule / logistics</label>'
        +'<input type="text" id="wsc-'+wk+'" class="input" placeholder="e.g. Training Mon 6pm + Wed 6pm · Game Saturday 10am at home" value="'+(e.schedule||'')+'"></div>'

        // Extra context
        +'<div class="form-group"><label class="label">Anything else to include? <span style="color:var(--text-muted);font-weight:400;font-size:11px">optional</span></label>'
        +'<textarea id="wctx-'+wk+'" class="input" style="min-height:45px" placeholder="e.g. Reminder about fee payment, kit collection, early finish this Wednesday"></textarea></div>';
    }

    return banner+fields;
  },

  async generateEmailAI(wk){
    const isGame=(State.weeklyEmails[wk]?.email_type==='pregame');
    const ep=document.getElementById('ep-'+wk);
    const eb=document.getElementById('et-body-'+wk);
    if(ep)ep.style.display='block';
    if(eb){eb.value='Generating your email…';eb.style.opacity='0.5';}

    // Read all prompt fields
    const gameReflection=(document.getElementById('wf-'+wk)?.value||'').trim();
    const teamFocus=(document.getElementById('wr-'+wk)?.value||'').trim();
    const valuesNote=(document.getElementById('wval-'+wk)?.value||'').trim();
    const spotlight=(document.getElementById('wsp-'+wk)?.value||'').trim();
    const schedule=(document.getElementById('wsc-'+wk)?.value||'').trim();
    const extraContext=(document.getElementById('wctx-'+wk)?.value||'').trim();

    // Get sessions for this week
    const startDateStr=State.settings.seasonStartDate||'';
    const startDate=startDateStr?new Date(startDateStr):null;
    let weekSessions=[];
    if(startDate){
      const wkStart=new Date(startDate);wkStart.setDate(wkStart.getDate()+(wk-1)*7);
      const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
      weekSessions=State.sessions.filter(s=>{const d=new Date(s.date||s.created_at);return d>=wkStart&&d<=wkEnd;});
    }
    if(!weekSessions.length)weekSessions=State.sessions.slice(0,2);

    const training=weekSessions.filter(s=>s.session_objective!=='Game Day'&&!s.session_objective?.startsWith('GAMEDAY'));
    const games=weekSessions.filter(s=>s.session_objective==='Game Day'||s.session_objective?.startsWith('GAMEDAY'));

    // Build rich session context from AI analysis fields
    const sessionData=training.map(s=>{
      const parts=[];
      if(s.title)parts.push('Session topic: '+s.title);
      if(s.session_objective)parts.push('Objective: '+s.session_objective);
      if(s.focus_area_1)parts.push('Focus area 1: '+s.focus_area_1);
      if(s.focus_area_2)parts.push('Focus area 2: '+s.focus_area_2);
      if(s.encouragement)parts.push('What went well: '+s.encouragement);
      if(s.grade)parts.push('Session grade: '+s.grade);
      return parts.join('. ');
    }).join('\n\n');

    const gameData=games.map(s=>{
      const parts=[];
      if(s.title)parts.push('Game: '+s.title);
      if(s.encouragement)parts.push('What went well: '+s.encouragement);
      if(s.focus_area_1)parts.push('Focus area 1: '+s.focus_area_1);
      if(s.focus_area_2)parts.push('Focus area 2: '+s.focus_area_2);
      return parts.join('. ');
    }).join('\n\n');

    const teamValues=State.values.length?State.values.join(', '):'';
    const prevBodies=Object.values(State.weeklyEmails).filter(e=>e.body&&e.week<wk).slice(-3).map(e=>e.body);
    const styleSample=prevBodies.join(' | ').slice(0,600);
    const name=coachName();

    // Build AI prompt
    let p='';
    p+='You are writing a parent email for '+name+', a youth football/soccer coach.\n\n';
    p+='EMAIL TYPE: '+(isGame?'Pre-Game email (sent the day before a match)':'Monday email (sent at the start of the training week)')+'\n\n';

    if(sessionData)p+='SESSION ANALYSIS FROM UPLOADS:\n'+sessionData+'\n\n';
    if(gameData)p+='GAME DAY ANALYSIS FROM UPLOADS:\n'+gameData+'\n\n';
    if(gameReflection)p+='COACH NOTES ON THE GAME: '+gameReflection+'\n\n';
    if(teamFocus)p+='WHAT THE TEAM IS WORKING ON: '+teamFocus+'\n\n';
    if(teamValues)p+='TEAM VALUES: '+teamValues+'\n\n';
    if(valuesNote)p+='VALUES DEMONSTRATED THIS WEEK: '+valuesNote+'\n\n';
    if(spotlight)p+='PLAYER SPOTLIGHT: '+spotlight+'\n\n';
    if(schedule)p+='LOGISTICS: '+schedule+'\n\n';
    if(extraContext)p+='EXTRA CONTEXT: '+extraContext+'\n\n';
    if(styleSample)p+='MATCH THIS COACH\u2019S WRITING STYLE (previous emails):\n'+styleSample+'\n\n';

    p+='INSTRUCTIONS:\n';
    p+='1. Write in flowing paragraphs — NO headers, NO bullet points, NO all-caps section titles\n';
    p+='2. Warm and conversational — like a genuine letter from a coach who cares\n';
    p+='3. Development-focused — never about the result, always about growth\n';
    p+='4. The training section must be about what the TEAM is working on and developing — not personal coaching goals\n';
    p+='5. Normalise mistakes — frame them as opportunities to learn\n';
    p+='6. Reference team values naturally if relevant\n';
    if(!isGame){
      p+='7. Include a PARENT REINFORCEMENT section woven naturally into the text — based on what the team is working on, give parents 2-3 specific questions to ask their child (e.g. "Ask them: What did you try today that was hard? What would you do differently?"). These should feel like conversation starters, not homework\n';
      p+='8. The questions should connect directly to the training topic and values demonstrated\n';
    } else {
      p+='7. Help parents watch intelligently — explain what the team is trying to do so parents can appreciate development moments\n';
      p+='8. Remind parents the best thing they can do is encourage without directing — let the players communicate their own ideas\n';
    }
    p+='9. Start with: Hi everyone,\n';
    p+='10. End with: Thank you for all that you do! then a new line with just: '+name+'\n';
    p+='11. Keep it to 3-4 paragraphs maximum — coaches and parents are busy\n';
    p+='12. Write ONLY the email text — no subject line, no commentary\n';

    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_KEY},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:p}]})
      });
      const body=resp.ok?(await resp.json()).content[0].text.trim():Team.fallbackEmail(isGame,training,games,schedule,extraContext,name);
      if(eb){eb.value=body;eb.style.opacity='1';}
      State.weeklyEmails[wk]={...State.weeklyEmails[wk],body,email_type:isGame?'pregame':'monday',schedule,spotlight};
      await sb.from('weekly_emails').upsert({user_id:State.user.id,coach_name:coachName(),week:wk,body,email_type:isGame?'pregame':'monday',schedule,spotlight},{onConflict:'user_id,week'});
    }catch(err){
      console.error('Email generation error:',err);
      const body=Team.fallbackEmail(isGame,training,games,schedule,extraContext,name);
      if(eb){eb.value=body||('Error generating email: '+err.message+'. Please try again or use Create Own.');eb.style.opacity='1';}
    }
  },

  async generateFromPrompts(wk,isGame){
    const ep=document.getElementById('ep-'+wk);
    const eb=document.getElementById('et-body-'+wk);
    if(ep)ep.style.display='block';
    if(eb){eb.value='Generating your email…';eb.style.opacity='0.5';}

    const gameSummary=(document.getElementById('co-game-'+wk)?.value||'').trim();
    const topicSummary=(document.getElementById('co-topic-'+wk)?.value||'').trim();
    const moment=(document.getElementById('co-moment-'+wk)?.value||'').trim();
    const reinforce=(document.getElementById('co-reinforce-'+wk)?.value||'').trim();
    const focus=(document.getElementById('co-focus-'+wk)?.value||'').trim();
    const training=(document.getElementById('co-training-'+wk)?.value||'').trim();
    const parents=(document.getElementById('co-parents-'+wk)?.value||'').trim();
    const schedule=(document.getElementById('co-schedule-'+wk)?.value||'').trim();

    const name=coachName();
    const ageGroup=State.profile?.age_group||'';
    const vals=State.values.length?State.values.join(', '):'';
    const ctx=Framework.getAgeContext(ageGroup);
    const prevBodies=Object.values(State.weeklyEmails).filter(e=>e.body&&e.week<wk).slice(-3).map(e=>e.body);
    const styleSample=prevBodies.join(' | ').slice(0,500);

    const nl='\n';
    let p='You are writing a parent email for '+name+', a youth football/soccer coach.'+nl+nl;
    p+='AGE GROUP: '+ageGroup+' | DEVELOPMENTAL STAGE: '+ctx.dev+nl+nl;
    p+='EMAIL TYPE: '+(isGame?'Pre-Game email':'Monday email')+nl+nl;
    if(!isGame){
      if(gameSummary)p+='COACH NOTES ON THE GAME: '+gameSummary+nl+nl;
      if(topicSummary)p+='WHAT THE TEAM IS WORKING ON: '+topicSummary+nl+nl;
      if(moment)p+='MOMENT TO HIGHLIGHT: '+moment+nl+nl;
      if(reinforce)p+='WHAT PARENTS CAN REINFORCE: '+reinforce+nl+nl;
    } else {
      if(focus)p+='GAME FOCUS: '+focus+nl+nl;
      if(training)p+='TRAINING THIS WEEK: '+training+nl+nl;
      if(parents)p+='SIDELINE GUIDANCE: '+parents+nl+nl;
    }
    if(schedule)p+='LOGISTICS: '+schedule+nl+nl;
    if(vals)p+='TEAM VALUES: '+vals+nl+nl;
    if(styleSample)p+='MATCH THIS WRITING STYLE:'+nl+styleSample+nl+nl;
    p+='AGE COACHING CONTEXT:'+nl+ctx.coaching.slice(0,400)+nl+nl;
    p+='INSTRUCTIONS:'+nl;
    p+='1. EXPAND the coach notes into a warm flowing email - do not just repeat their words'+nl;
    p+='2. Use developmental and age-appropriate language for '+ageGroup+' parents'+nl;
    p+='3. Flowing paragraphs only - NO headers, NO bullets'+nl;
    p+='4. Development-focused - frame everything as growth not results'+nl;
    p+='5. Normalise mistakes - they are part of the process'+nl;
    if(!isGame){
      p+='6. Weave in 2-3 conversation starter questions parents can ask their child'+nl;
      p+='7. Reference team values naturally if provided'+nl;
    } else {
      p+='6. Help parents understand what to look for on match day'+nl;
      p+='7. Remind parents to encourage without directing'+nl;
    }
    p+='8. Start with: Hi everyone,'+nl;
    p+='9. End with: Thank you for all that you do! then new line: '+name+nl;
    p+='10. Keep to 3-4 paragraphs'+nl;
    p+='11. Write ONLY the email text - no commentary';

    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':ANTHROPIC_KEY},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:p}]})
      });
      const body=resp.ok?(await resp.json()).content[0].text.trim():Team.fallbackEmail(isGame,[],[],schedule,'',name);
      if(eb){eb.value=body;eb.style.opacity='1';}
      State.weeklyEmails[wk]={...State.weeklyEmails[wk],body,email_type:isGame?'pregame':'monday'};
      await sb.from('weekly_emails').upsert({user_id:State.user.id,coach_name:coachName(),week:wk,body,email_type:isGame?'pregame':'monday'},{onConflict:'user_id,week'});
    }catch(err){
      console.error('generateFromPrompts error:',err);
      if(eb){eb.value='Could not generate email: '+err.message+'. Try again or use Write My Own.';eb.style.opacity='1';}
    }
  },


  fallbackEmail(isGame,training,games,schedule,context,name){
    const nl='\n';
    const game=Array.isArray(games)?games[0]:null;
    const session=Array.isArray(training)?training[0]:null;
    let b='Hi everyone,'+nl+nl;
    if(isGame){
      if(session)b+='This week in training we have been working on '+(session.focus_area_1||session.title||'our session goals')+'. The effort has been great and the players are developing well.'+nl+nl;
      b+='I am really looking forward to watching the team compete'+(schedule?' — '+schedule:'')+'. As always there will be moments that go well and moments that are a work in progress — that is the nature of development.'+nl+nl;
      b+='The best thing you can do on the sideline is encourage without directing. Let the players communicate their own ideas on the field.'+nl+nl;
    } else {
      if(game)b+=(game.encouragement||'It was great to watch the team on Saturday. They are developing well and it shows in how they are playing.')+nl+nl;
      if(session)b+='This week we are going to focus on '+(session.focus_area_1||session.title||'continuing our development')+(session.focus_area_2?'. We will also be working on '+session.focus_area_2:'')+'.'+(context?' '+context:'')+nl+nl;
      else if(context)b+=context+nl+nl;
    }
    if(schedule)b+='UPCOMING: '+schedule+nl+nl;
    b+='Thank you for all that you do!'+nl+nl+name;
    return b;
  },

    {id:'q21',week:11,theme:'Gratitude',prompt:'What are the top seven things in my life I am grateful for? How can I let my day reflect them?',depth:'Gratitude is an active reorientation toward what is already working.',follow:'Which of the seven do you least often stop to appreciate?'},
    {id:'q22',week:11,theme:'Positive Attitude',prompt:'What three things can I do today to demonstrate a more positive attitude toward my athletes?',depth:'Attitude is a decision made before you arrive.',follow:'Which would have the biggest impact on the player you find hardest to connect with?'},

  renderImprove(){
    State.currentSubSection='improve';
    const ss=State.sessions.filter(s=>s.session_objective!=='Game Day');
    const areas=[];
    if(ss.length){
      const ag=State.profile?.age_group||'U13';
      const ctx=Framework.getAgeContext(ag);
      const tgt=ctx.targets;
      const avg=key=>ss.reduce((a,s)=>a+parseFloat(s[key]||0),0)/ss.length;
      const qi=avg('qi_ratio'),pc=avg('pc_ratio'),hq=avg('high_order_q'),freeze=avg('freeze_moment'),show=avg('show_me_count');

      if(qi<tgt.qi)areas.push({title:'Questioning Balance (Q:I Ratio)',current:`${fmt(qi)} avg`,target:ctx.qiLabel,priority:'high',why:`For ${ag} coaches, the target is ${ctx.qiLabel}. Players who answer questions learn faster than players who receive instructions. Your Q:I ratio suggests more instructions than questions.`,actions:['Before each activity, prepare 2 open questions to ask during play','Ask "What do you see?" before giving any instruction','After giving an instruction, follow with "Why do you think that is?"']});
      if(parseInt(avg('high_order_q'))<tgt.hq)areas.push({title:'High-Order Questioning',current:`${fmt(avg('high_order_q'),0)} per session`,target:`≥ ${tgt.hq}`,priority:'high',why:'High-order questions (What/Why/How/What if) develop game intelligence. Low-order questions (Did you/Where/Who) only test recall. The shift from "Did you see the space?" to "What do you see?" changes everything.',actions:['Replace every "Did you?" with "What did you?"','Ask "Why?" after every player answer — push one level deeper','Prepare one "What if?" scenario per activity']});
      if(pc<tgt.pc)areas.push({title:'Praise to Correction Ratio',current:`${fmt(pc)} avg`,target:'≥ 3:1',priority:'medium',why:'When players receive more corrections than praise, they become risk-averse — playing not to get it wrong rather than trying to get it right. Build the praise bank first.',actions:['Set a personal target: 3 specific praises before any correction','Praise → Correct → Encourage — use this every time','Name the player and name the action: "Jordan, that run created the space"']});
      if(freeze<tgt.freeze)areas.push({title:'Freeze Moments (Freeze → Demo → Rehearse → Restart)',current:`${fmt(freeze,1)} per session`,target:`≥ ${tgt.freeze}`,priority:'medium',why:'The US Soccer coaching standard requires planned freeze moments. Freeze → ask a question → use the ball to demonstrate (not words) → players rehearse → restart. This is your highest-leverage teaching tool.',actions:['Plan one specific freeze moment per activity before training starts','When you freeze: ask a question first, THEN demonstrate with the ball','Do NOT bring players in and talk at them — use the ball to paint the picture']});
      if(show<2)areas.push({title:'Demonstrations — Use the Ball',current:`${fmt(show,1)} per session`,target:'≥ 2-3',priority:'low',why:'Visual demonstrations accelerate learning. The US Soccer standard is to paint the picture with the ball — not describe it with words. "Show me" is one of your most powerful coaching tools.',actions:['Ask a player to "show me" rather than always demonstrating yourself','Use every freeze moment as a demonstration opportunity','Always demonstrate WHY, not just WHAT']});
    }

    setMain(`
    <div class="page-header"><h1>Areas to Improve</h1><p>Data-driven development priorities from your sessions</p></div>
    <div class="page-body">
      ${!ss.length?`<div class="empty"><div class="empty-icon">📊</div><h3>Upload your first session</h3><p>Your improvement areas will appear here once you've uploaded and analysed at least one training session.</p><button class="btn btn-primary" style="margin-top:14px" onclick="Nav.go('sessions','new')">Upload Session</button></div>`:''}
      ${areas.map(a=>`<div class="card" style="border-left:4px solid ${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--lime)'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:14px;font-weight:700;color:var(--dark)">${a.title}</div>
          <span class="badge ${a.priority==='high'?'badge-red':a.priority==='medium'?'badge-amber':'badge-lime'}">${a.priority}</span>
        </div>
        <div style="display:flex;gap:16px;margin-bottom:10px;font-size:13px">
          <div><span style="color:var(--text-muted)">Current: </span><strong>${a.current}</strong></div>
          <div><span style="color:var(--text-muted)">Target: </span><strong style="color:var(--dark)">${a.target}</strong></div>
        </div>
        <p style="font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:10px">${a.why}</p>
        <div style="background:var(--lime-pale);border-radius:var(--radius-xs);padding:10px 12px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--dark);margin-bottom:7px">What to try this week</div>
          ${a.actions.map(ac=>`<div style="display:flex;gap:7px;margin-bottom:5px;font-size:13px"><span style="color:var(--lime);font-weight:700;flex-shrink:0">→</span><span>${ac}</span></div>`).join('')}
        </div>
      </div>`).join('')}
      ${areas.length===0&&ss.length>0?`<div class="alert alert-success">All metrics are above target. Keep maintaining your standards and look for ways to deepen the quality of your questioning and player connections.</div>`:''}
    </div>`);
  },

  renderProgress(){
    State.currentSubSection='progress';
    const ss=State.sessions.filter(s=>s.session_objective!=='Game Day');
    if(!ss.length){
      setMain(`<div class="page-header"><h1>Progress Tracker</h1></div><div class="page-body"><div class="empty"><div class="empty-icon">📈</div><h3>No sessions yet</h3><p>Upload training sessions to track your development over time.</p><button class="btn btn-primary" style="margin-top:14px" onclick="Nav.go('sessions','new')">Upload Session</button></div></div>`);

    }
    const sorted=[...ss].sort((a,b)=>new Date(a.date)-new Date(b.date));

    const roadmapDone=Object.values(State.roadmap).filter(r=>r.checked).length;

      <div class="grid-2" style="margin-bottom:12px">
        <div class="card"><div class="card-title">High-Order Questions Trend</div><div class="chart-wrap-sm"><canvas id="pH"></canvas></div></div>
        <div class="card"><div class="card-title">P:C Ratio Trend</div><div class="chart-wrap-sm"><canvas id="pP"></canvas></div></div>
      </div>
      <div class="card"><div class="card-title">Session Grades</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${sorted.map(s=>`<div style="text-align:center"><div class="grade ${Sessions.gc(s.grade)}" style="width:36px;height:36px;font-size:14px">${s.grade||'—'}</div><div style="font-size:10px;color:var(--text-faint);margin-top:2px">${s.date?.slice(5)||''}</div></div>`).join('')}

      const mk=(id,type,data,opts)=>{const el=$(id);if(!el)return;const c=new Chart(el,{type,data,options:opts||lo});State.activeCharts.push(c);};

    },80);

  async renderCoaches(){

    const{data:members}=await sb.from('profiles').select('*').eq('club_id',myClub.id);
    const coaches=(members||[]).filter(m=>m.id!==profile.id);

    let allSessions=[],allRoadmaps=[],allEmails=[],allNotes=[];
    if(coaches.length){
      const ids=coaches.map(c=>c.id);
      const[{data:s},{data:r},{data:e},{data:n}]=await Promise.all([
        sb.from('sessions').select('id,user_id,title,date,grade,qi_ratio,session_objective,created_at').in('user_id',ids).order('created_at',{ascending:false}),
        sb.from('roadmap').select('user_id,checked').in('user_id',ids),
        sb.from('weekly_emails').select('user_id,sent').in('user_id',ids),
        sb.from('director_notes').select('*').eq('director_id',profile.id)
      ]);
      allSessions=s||[];allRoadmaps=r||[];allEmails=e||[];allNotes=n||[];
    }

    const stats=coaches.map(coach=>{
      const cs=allSessions.filter(s=>s.user_id===coach.id);
      const training=cs.filter(s=>!s.session_objective?.startsWith('GAMEDAY'));
      const avgQI=training.length?training.reduce((a,s)=>a+parseFloat(s.qi_ratio||0),0)/training.length:0;
      const lastUp=cs[0];
      const daysSince=lastUp?Math.floor((new Date()-new Date(lastUp.created_at))/(1000*60*60*24)):999;
      const roadmapDone=(allRoadmaps.filter(r=>r.user_id===coach.id&&r.checked)).length;
      const emailsSent=(allEmails.filter(e=>e.user_id===coach.id&&e.sent)).length;
      const latestGrade=training[0]?.grade||'—';
      const notes=allNotes.filter(n=>n.coach_id===coach.id);
      const lastContact=notes.length?notes.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]:null;
      const daysSinceContact=lastContact?Math.floor((new Date()-new Date(lastContact.created_at))/(1000*60*60*24)):999;
      return{coach,training,avgQI,daysSince,roadmapDone,emailsSent,latestGrade,notes,daysSinceContact};
    });

    const needsContact=stats.filter(s=>s.daysSinceContact>14);
    const needsUpload=stats.filter(s=>s.daysSince>14);

    const mainHtml=`
    <div class="page-header">
      <div><h1>${myClub.name}</h1><p>Code: <strong style="color:var(--lime);letter-spacing:2px">${myClub.code}</strong> · ${coaches.length} coach${coaches.length!==1?'es':''}</p></div>
    </div>
    <div class="page-body">
      ${needsContact.length?`<div class="alert alert-warn"><strong>⚠ Check-in needed:</strong> ${needsContact.map(s=>s.coach.first_name+' '+s.coach.last_name).join(', ')} — no contact logged in 14+ days.</div>`:''}
      ${needsUpload.length?`<div class="alert alert-warn"><strong>⚠ No upload:</strong> ${needsUpload.map(s=>s.coach.first_name+' '+s.coach.last_name).join(', ')} — no session in 14+ days.</div>`:''}

      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Connection Heatmap — Your Coaches</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text-muted)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:#22c55e;display:inline-block"></span>Active contact</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:#f59e0b;display:inline-block"></span>14+ days</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:#ef4444;display:inline-block"></span>No contact</span>
        </div>
        ${stats.map(({coach,daysSinceContact,notes,latestGrade,daysSince})=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="Director.viewCoach('${coach.id}')">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--dark);color:var(--lime);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">${coach.first_name?.charAt(0)||'?'}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${coach.first_name} ${coach.last_name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${coach.age_group||'—'} · Last session: ${daysSince===999?'Never':daysSince+'d ago'}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <div style="width:14px;height:38px;border-radius:3px;background:${daysSinceContact<=7?'#22c55e':daysSinceContact<=14?'#f59e0b':'#ef4444'};opacity:.85"></div>
            <div class="grade ${Sessions.gc(latestGrade)}" style="width:30px;height:30px;font-size:13px">${latestGrade}</div>
            <span style="font-size:11px;color:var(--lime);font-weight:600">View →</span>
          </div>
        </div>`).join('')}
        ${!coaches.length?`<div class="empty" style="padding:24px"><div class="empty-icon">👥</div><h3>No coaches yet</h3><p>Share code <strong style="color:var(--lime)">${myClub.code}</strong> with coaches to add them.</p></div>`:''}
      </div>
    </div>`;
    Director.setLayout('coaches',mainHtml);
  },

  // ── COACH DETAIL ───────────────────────────────────────────────────────────
  async viewCoach(coachId){
    State.viewingCoachId=coachId;
    const{data:coach}=await sb.from('profiles').select('*').eq('id',coachId).single();
    const[{data:sessions},{data:roadmap},{data:notes}]=await Promise.all([
      sb.from('sessions').select('id,title,date,age_group,grade,qi_ratio,pc_ratio,high_order_q,low_order_q,individual_praise,freeze_moment,show_me_count,focus_area_1,focus_area_2,actions,session_objective,encouragement,created_at').eq('user_id',coachId).order('date',{ascending:false}),
      sb.from('roadmap').select('*').eq('user_id',coachId),
      sb.from('director_notes').select('*').eq('coach_id',coachId).eq('director_id',State.profile.id).order('created_at',{ascending:false})
    ]);

    const training=(sessions||[]).filter(s=>!s.session_objective?.startsWith('GAMEDAY'));
    const games=(sessions||[]).filter(s=>s.session_objective?.startsWith('GAMEDAY'));
    const sorted=[...training].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const _fw=Framework.getAgeContext(coach.age_group||'U13');
    const fw={phase:_fw.phase,qiTarget:_fw.targets?.qi||0.5,pcTarget:_fw.targets?.pc||3};

    // Top strengths — from encouragement text
    const avgQI=training.length?training.reduce((a,s)=>a+parseFloat(s.qi_ratio||0),0)/training.length:0;
    const avgPC=training.length?training.reduce((a,s)=>a+parseFloat(s.pc_ratio||0),0)/training.length:0;
    const avgHQ=training.length?training.reduce((a,s)=>a+parseInt(s.high_order_q||0),0)/training.length:0;
    const roadmapDone=(roadmap||[]).filter(r=>r.checked);

    // Focus area frequency — what keeps coming up
    const focusCount={};
    training.forEach(s=>{
      if(s.focus_area_1)focusCount[s.focus_area_1]=(focusCount[s.focus_area_1]||0)+1;
      if(s.focus_area_2)focusCount[s.focus_area_2]=(focusCount[s.focus_area_2]||0)+1;
    });
    const topFocus=Object.entries(focusCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

    const mainHtml=`
    <div class="page-header">
      <div>
        <h1>${coach.first_name} ${coach.last_name}</h1>
        <p>${coach.age_group||'—'} · ${coach.level||'—'} · ${fw.phase}</p>
      </div>
      <button class="btn btn-sm" onclick="Director.renderCoaches()">← All Coaches</button>
    </div>
    <div class="page-body">
      <div class="tabs" style="margin-bottom:16px">
        <button class="tab-btn active" id="dct-1" onclick="Director.coachTab(1,'${coachId}')">Progress Tracker</button>
        <button class="tab-btn" id="dct-2" onclick="Director.coachTab(2,'${coachId}')">Roadmap Progress</button>
        <button class="tab-btn" id="dct-3" onclick="Director.coachTab(3,'${coachId}')">My Notes</button>
      </div>
      <div id="dct-content">
        <!-- Progress Tracker Tab -->
        <div id="dct-body-1">
          <div class="grid-4" style="margin-bottom:14px">
            <div class="metric-card"><div class="metric-label">Avg Q:I</div><div class="metric-value" style="color:${avgQI>=fw.qiTarget?'var(--lime)':'#fbbf24'}">${avgQI.toFixed(2)}</div><div class="metric-sub">Target ≥${fw.qiTarget}</div></div>
            <div class="metric-card"><div class="metric-label">Avg P:C</div><div class="metric-value" style="color:${avgPC>=fw.pcTarget?'var(--lime)':'#fbbf24'}">${avgPC.toFixed(2)}</div><div class="metric-sub">Target ≥${fw.pcTarget}</div></div>
            <div class="metric-card"><div class="metric-label">Sessions</div><div class="metric-value">${training.length}</div><div class="metric-sub">+ ${games.length} game days</div></div>
            <div class="metric-card"><div class="metric-label">Avg High-Q</div><div class="metric-value">${avgHQ.toFixed(1)}</div><div class="metric-sub">Per session</div></div>
          </div>

          ${sorted.length>1?`<div class="card" style="margin-bottom:14px">
            <div class="card-title">Q:I Ratio — Session by Session</div>
            <div style="position:relative;height:180px"><canvas id="dcQ"></canvas></div>
          </div>`:''}

          <div class="card" style="margin-bottom:14px">
            <div class="card-title">Session Grades</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 0">
              ${training.map(s=>`<div style="text-align:center">
                <div class="grade ${Sessions.gc(s.grade)}" style="width:36px;height:36px;font-size:14px">${s.grade||'—'}</div>
                <div style="font-size:10px;color:var(--text-faint);margin-top:3px">${s.date?.slice(5)||''}</div>
              </div>`).join('')}
            </div>
          </div>

          ${topFocus.length?`<div class="card" style="margin-bottom:14px">
            <div class="card-title">Top Development Areas — Most Frequent Focus</div>
            ${topFocus.map(([area,count])=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="flex:1;font-size:13px;font-weight:500">${area}</div>
              <div style="display:flex;gap:3px">${Array.from({length:Math.min(count,8)},()=>`<div style="width:10px;height:20px;background:var(--lime);border-radius:2px;opacity:.8"></div>`).join('')}</div>
              <span style="font-size:12px;color:var(--text-muted);min-width:30px">${count}x</span>
            </div>`).join('')}
          </div>`:''}

          <div class="card">
            <div class="card-title">Session History & Focus Areas</div>
            ${!training.length?`<p style="font-size:13px;color:var(--text-muted)">No sessions uploaded yet.</p>`:''}
            ${training.map(s=>{
              let acts=[];try{acts=typeof s.actions==='string'&&s.actions.startsWith('[')?JSON.parse(s.actions):[];}catch(e){}
              return`<div style="border:1px solid var(--border);border-radius:var(--radius-xs);padding:14px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:${acts.length||s.focus_area_1?'10px':'0'}">
                  <div class="grade ${Sessions.gc(s.grade)}" style="width:30px;height:30px;font-size:13px">${s.grade||'—'}</div>
                  <div style="flex:1">
                    <div style="font-size:13px;font-weight:600">${s.title||'Session'}</div>
                    <div style="font-size:11px;color:var(--text-muted)">${s.date||''} · Q:I ${parseFloat(s.qi_ratio||0).toFixed(2)} · P:C ${parseFloat(s.pc_ratio||0).toFixed(2)}</div>
                  </div>
                </div>
                ${acts.length?`<div style="background:var(--lime-pale);border-radius:var(--radius-xs);padding:10px 12px">
                  ${acts.map(a=>`<div style="font-size:12px;margin-bottom:4px">→ <strong>${a.area||''}</strong> — ${a.action||''}</div>`).join('')}
                </div>`:s.focus_area_1?`<div style="background:var(--lime-pale);border-radius:var(--radius-xs);padding:10px 12px">
                  ${s.focus_area_1?`<div style="font-size:12px;margin-bottom:4px">→ ${s.focus_area_1}</div>`:''}
                  ${s.focus_area_2?`<div style="font-size:12px">→ ${s.focus_area_2}</div>`:''}
                </div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- Roadmap Tab (hidden by default) -->
        <div id="dct-body-2" style="display:none">
          <div class="card">
            <div class="card-title">Roadmap Progress — ${roadmapDone.length} items completed</div>
            <div class="prog-bar" style="margin-bottom:16px;height:10px"><div class="prog-fill" style="width:${roadmapDone.length>0?Math.min(100,Math.round(roadmapDone.length/20*100)):0}%"></div></div>
            ${roadmapDone.length?roadmapDone.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="width:20px;height:20px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#14532d" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
              </div>
              <span style="font-size:13px">${r.key?.split('-').slice(1).join(' ').replace(/-/g,' ')||r.key}</span>
            </div>`).join(''):`<p style="font-size:13px;color:var(--text-muted)">No roadmap items completed yet.</p>`}
          </div>

          <div class="card" style="margin-top:14px">
            <div class="card-title">Weekly Emails Sent</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0">
              <!-- Email circles loaded separately -->
              <p style="font-size:13px;color:var(--text-muted)">Email data loaded from coach profile.</p>
            </div>
          </div>
        </div>

        <!-- Notes Tab (hidden by default) -->
        <div id="dct-body-3" style="display:none">
          <div class="card" style="margin-bottom:14px">
            <div class="card-title">Log Contact / Observation</div>
            <div class="form-group"><label class="label">Type</label>
              <select id="nt-type" class="input">
                <option value="observation">Session Observation</option>
                <option value="meeting">Coach Meeting</option>
                <option value="conversation">Conversation</option>
                <option value="email">Email</option>
                <option value="checkin">Check-in</option>
              </select>
            </div>
            <div class="form-group"><label class="label">Notes</label>
              <textarea id="nt-notes" class="input" placeholder="What did you discuss? What did you observe? What are your recommendations?" style="min-height:100px"></textarea>
            </div>
            <div class="form-group"><label class="label">Upload Meeting Recording or Document (optional)</label>
              <div class="upload-zone" onclick="$('nt-file').click()" style="padding:16px">
                <div class="upload-icon" style="font-size:22px">📎</div>
                <p style="font-size:12px">Click to attach a file</p>
              </div>
              <input type="file" id="nt-file" style="display:none" accept=".mp3,.m4a,.wav,.pdf,.docx,.txt">
            </div>
            <button class="btn btn-primary" onclick="Director.saveNote('${coachId}','${coach.first_name} ${coach.last_name}')">Save Contact Log</button>
          </div>

          <div class="card">
            <div class="card-title">Contact History — ${notes?.length||0} entries</div>
            ${!notes?.length?`<div class="empty" style="padding:20px"><p>No contact logged yet. Use the form above to record observations, meetings and conversations.</p></div>`:''}
            ${(notes||[]).map(n=>`<div style="border:1px solid var(--border);border-radius:var(--radius-xs);padding:14px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <span class="badge ${n.type==='observation'?'badge-lime':n.type==='meeting'?'badge-blue':n.type==='email'?'badge-amber':'badge-green'}">${n.type||'note'}</span>
                <span style="font-size:12px;color:var(--text-muted)">${n.created_at?.slice(0,10)||''}</span>
              </div>
              <p style="font-size:13px;line-height:1.7;color:var(--text)">${n.notes||''}</p>
              ${n.file_name?`<div style="margin-top:8px;font-size:12px;color:var(--lime)">📎 ${n.file_name}</div>`:''}
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

    Director.setLayout('coaches', mainHtml);

    setTimeout(()=>{
      if(sorted.length>1){
        const el=$('dcQ');if(!el)return;
        const c=new Chart(el,{type:'line',data:{labels:sorted.map(s=>s.date?.slice(5)||''),datasets:[{data:sorted.map(s=>parseFloat(s.qi_ratio)||0),borderColor:'#84cc16',backgroundColor:'rgba(132,204,22,.1)',tension:.3,fill:true,pointRadius:5,pointBackgroundColor:'#84cc16'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},beginAtZero:true,suggestedMax:1.5}}}});
        State.activeCharts.push(c);
      }
    },150);
  },

  coachTab(tab, coachId){
    [1,2,3].forEach(t=>{
      const btn=$(`dct-${t}`);const body=$(`dct-body-${t}`);
      if(btn)btn.classList.toggle('active',t===tab);
      if(body)body.style.display=t===tab?'block':'none';
    });
  },

  async saveNote(coachId, coachName){
    const type=$('nt-type')?.value||'note';
    const notes=$('nt-notes')?.value?.trim()||'';
    const file=$('nt-file')?.files?.[0];
    if(!notes){alert('Please add some notes.');return;}
    const row={director_id:State.profile.id,coach_id:coachId,coach_name:coachName,type,notes,file_name:file?.name||null,created_at:new Date().toISOString()};
    const{error}=await sb.from('director_notes').insert(row);
    if(error){alert('Error saving: '+error.message);return;}
    Director.viewCoach(coachId);
  },

  // ── CULTURE UPLOAD TAB ─────────────────────────────────────────────────────
  async renderCulture(){
    State.currentSubSection='culture';
    const{data:resources}=await sb.from('club_resources').select('*').eq('director_id',State.profile.id).order('created_at',{ascending:false});
    const cats=['Club Values','Parent Meeting Template','Team Meeting Template','Individual Meeting Template','Evaluation Template','Weekly Email Template','Audio Upload Framework','Other'];

    const mainHtml=`
    <div class="page-header"><div><h1>Culture Upload</h1><p>Resources available to all coaches in your club</p></div></div>
    <div class="page-body">
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Upload Club Resource</div>
        <div class="form-group"><label class="label">Category</label>
          <select id="res-cat" class="input">${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="label">Title</label>
          <input type="text" id="res-title" class="input" placeholder="e.g. NCYSA Parent Meeting Template 2025">
        </div>
        <div class="form-group"><label class="label">Description (optional)</label>
          <textarea id="res-desc" class="input" placeholder="Brief description of this resource..." style="min-height:60px"></textarea>

          <div class="upload-icon">📁</div>
          <p><strong>Click to upload</strong> a PDF, Word doc, or text file</p>
          <p style="font-size:11px;color:var(--text-faint);margin-top:4px">.pdf · .docx · .txt · .mp3 · .m4a</p>
        </div>
        <input type="file" id="resFile" style="display:none" accept=".pdf,.docx,.txt,.mp3,.m4a,.wav" onchange="Director.handleResourceFile(this)">
        <button class="btn btn-primary" onclick="Director.saveResource()">Upload Resource</button>
      </div>

      <div class="card">
        <div class="card-title">Club Resources — ${(resources||[]).length} uploaded</div>
        ${!(resources||[]).length?`<div class="empty" style="padding:24px"><div class="empty-icon">📁</div><h3>No resources yet</h3><p>Upload templates and frameworks to make them available to all coaches in your club.</p></div>`:''}
        ${cats.filter(cat=>(resources||[]).some(r=>r.category===cat)).map(cat=>`
        <div style="margin-bottom:16px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">${cat}</div>
          ${(resources||[]).filter(r=>r.category===cat).map(r=>`
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:20px">${r.file_name?.endsWith('.pdf')?'📄':r.file_name?.match(/\.(mp3|m4a|wav)$/)?'🎙️':'📝'}</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${r.title||r.file_name}</div>
              ${r.description?`<div style="font-size:12px;color:var(--text-muted)">${r.description}</div>`:''}
              <div style="font-size:11px;color:var(--text-faint)">${r.created_at?.slice(0,10)||''}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="Director.deleteResource('${r.id}')">Remove</button>
          </div>`).join('')}
        </div>`).join('')}
      </div>
    </div>`;
    Director.setLayout('culture', mainHtml);
  },

  handleResourceFile(input){
    const file=input.files[0];if(!file)return;
    const z=$('resZone');if(z)z.innerHTML=`<div class="upload-icon">✅</div><p><strong>${file.name}</strong> ready to upload</p>`;
    if(!$('res-title').value)$('res-title').value=file.name.replace(/\.[^.]+$/,'');
  },

  async saveResource(){
    const cat=$('res-cat')?.value||'Other';
    const title=$('res-title')?.value?.trim()||'';
    const desc=$('res-desc')?.value?.trim()||'';
    const file=$('resFile')?.files?.[0];
    if(!title){alert('Please add a title.');return;}
    const row={director_id:State.profile.id,category:cat,title,description:desc,file_name:file?.name||null,created_at:new Date().toISOString()};
    const{error}=await sb.from('club_resources').insert(row);
    if(error){alert('Error: '+error.message);return;}
    Director.renderCulture();
  },

  async deleteResource(id){
    await sb.from('club_resources').delete().eq('id',id);
    Director.renderCulture();
  },

  // ── MY TASKS TAB ───────────────────────────────────────────────────────────
  async renderTasks(){
    State.currentSubSection='tasks';
    const profile=State.profile;
    const{data:tasks}=await sb.from('director_tasks').select('*').eq('director_id',profile.id).order('created_at',{ascending:false});
    const{data:notes}=await sb.from('director_notes').select('coach_id,type,created_at').eq('director_id',profile.id);

    const taskTypes=['Email to Coach','Coach Meeting','Coach Observation','Check-in','Other'];
    const pending=(tasks||[]).filter(t=>!t.done);
    const done=(tasks||[]).filter(t=>t.done);

    // Build observation heatmap
    const observationMap={};
    (coaches||[]).forEach(c=>{
      const coachNotes=(notes||[]).filter(n=>n.coach_id===c.id);
      const lastObs=coachNotes.filter(n=>n.type==='observation').sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
      const lastContact=coachNotes.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
      observationMap[c.id]={
        lastObs:lastObs?.created_at||null,
        lastContact:lastContact?.created_at||null,
        obsCount:coachNotes.filter(n=>n.type==='observation').length,
        totalContact:coachNotes.length
      };
    });

    const mainHtml=`
    <div class="page-header"><div><h1>My Tasks</h1><p>${pending.length} pending · ${done.length} completed</p></div></div>
    <div class="page-body">

      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Observation Heatmap — Who Needs Attention</div>

        ${(coaches||[]).map(c=>{
          const m=observationMap[c.id]||{};
          const daysSinceObs=m.lastObs?Math.floor((new Date()-new Date(m.lastObs))/(1000*60*60*24)):999;
          const daysSinceContact=m.lastContact?Math.floor((new Date()-new Date(m.lastContact))/(1000*60*60*24)):999;
          return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
